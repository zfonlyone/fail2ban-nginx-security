# ============================================================
# Security Guard - Docker Compose 编排
# 说明: 安全模块独立 TG Bot
# ============================================================

services:
  # ─────────────────────────────────────────────────────────
  # Security Bot - 安全管理 Telegram 机器人
  # ─────────────────────────────────────────────────────────
  security-bot:
    build:
      context: ./tg-bot
      dockerfile: Dockerfile
    container_name: security-bot
    restart: unless-stopped
    pid: "host"
    privileged: true
    environment:
      - TZ=Asia/Shanghai
      - TG_BOT_TOKEN=${SEC_TG_BOT_TOKEN}
      - TG_CHAT_ID=${SEC_TG_CHAT_ID}
      - TG_ADMIN_IDS=${SEC_TG_ADMIN_IDS}
      - TG_TOPIC_ID=${SEC_TG_TOPIC_ID:-}
      - ALERT_BAN_THRESHOLD=${ALERT_BAN_THRESHOLD:-20}
      - ALERT_BAN_PER_MINUTE=${ALERT_BAN_PER_MINUTE:-60}
    volumes:
      - /etc/security-guard/ban:/etc/security-guard/ban:ro
      - /etc/security-guard/state:/etc/security-guard/state
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/local/bin/security-harden:/usr/local/bin/security-harden:ro
    healthcheck:
      test: [ "CMD-SHELL", "ps -ef | grep -q '[p]ython .*bot.py'" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - security-net

networks:
  security-net:
    driver: bridge
    name: security-net
